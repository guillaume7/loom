version: 2

project_name: loom

builds:
  - id: loom
    main: ./cmd/loom
    binary: loom
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}

archives:
  - id: binaries
    ids:
      - loom
    formats: [binary]
    name_template: loom-{{ .Os }}-{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  draft: false
  prerelease: auto
  header: |
    ## Loom {{ .Tag }}

    Release binaries and checksums generated by GoReleaser.