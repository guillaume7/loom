name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          # Build golangci-lint from source so the linter binary is compiled
          # with the installed Go toolchain (currently 1.26). The default
          # pre-compiled binary is built with an older Go version and cannot
          # handle the FIPS 140 crypto files added to the Go 1.26 stdlib
          # (fips140only_go1.26.go) or resolve types that depend on Go 1.26
          # net/http changes.
          install-mode: goinstall

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - run: go test ./... -race -coverprofile=coverage.out
      - run: go tool cover -func=coverage.out
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  build:
    runs-on: ubuntu-latest
    needs: [vet, lint, test]
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    env:
      GOOS: ${{ matrix.os }}
      GOARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - run: go build -ldflags="-s -w" -o loom-${{ matrix.os }}-${{ matrix.arch }} ./cmd/loom
      - uses: actions/upload-artifact@v4
        with:
          name: loom-${{ matrix.os }}-${{ matrix.arch }}
          path: loom-${{ matrix.os }}-${{ matrix.arch }}
